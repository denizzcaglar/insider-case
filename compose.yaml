services:
    app:
        build:
            context: .
            dockerfile: Dockerfile
        image: insider-case/app
        ports:
            - '8080:8080'
        networks:
            - sail
        depends_on:
            mysql:
                condition: service_healthy
            init:
                condition: service_completed_successfully
    init:
        image: insider-case/app
        # Reuses the image built by `app` (same tag), so the build runs once.
        # One-shot: migrate + seed, then exit. The image already ships a .env
        # with a generated APP_KEY, so there is nothing else to prepare.
        command:
            - sh
            - -c
            - 'php artisan migrate --force --seed'
        networks:
            - sail
        depends_on:
            mysql:
                condition: service_healthy
    mysql:
        image: 'mysql:8.4'
        ports:
            - '${FORWARD_DB_PORT:-33306}:3306'
        environment:
            MYSQL_ROOT_PASSWORD: 'password'
            MYSQL_ROOT_HOST: '%'
            MYSQL_DATABASE: 'laravel'
            MYSQL_USER: 'sail'
            MYSQL_PASSWORD: 'password'
            MYSQL_ALLOW_EMPTY_PASSWORD: 1
        volumes:
            - 'insider-mysql:/var/lib/mysql'
        networks:
            - sail
        healthcheck:
            test:
                - CMD
                - mysqladmin
                - ping
                - '-ppassword'
            retries: 10
            timeout: 5s
networks:
    sail:
        driver: bridge
volumes:
    insider-mysql:
        driver: local
